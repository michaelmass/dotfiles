windows:
  installs: scoop install https://github.com/JanDeDobbeleer/oh-my-posh/releases/latest/download/oh-my-posh.json
  links:
    config.omp.json: ~/.omp.config.json
    oh-my-posh.nu: ~/AppData/Roaming/nushell/vendor/autoload/oh-my-posh.nu

linux|darwin:
  installs: brew install jandedobbeleer/oh-my-posh/oh-my-posh
  links:
    config.omp.json: ~/.omp.config.json
    oh-my-posh.nu: ~/Library/Application Support/nushell/vendor/autoload/oh-my-posh.nu
